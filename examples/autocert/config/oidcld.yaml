# OIDCLD Configuration for Docker with myencrypt ACME
# This configuration enables Azure MSAL compatibility with automatic HTTPS certificates

# OpenID Connect IdP settings (Azure AD v2 compatible)
oidcld:
  iss: "https://oidc.localhost:8443"  # Use actual server URL for CORS testing
  pkce_required: true
  nonce_required: true
  expired_in: 3600
  aud_claim_format: string  # Keep single-audience aud aligned with EntraID-style output
  login_ui:
    env_title: "Compose Sample"
    accent_color: "#2563EB"
    info_markdown_file: "./login-info.md"
  refresh_token_enabled: true
  refresh_token_expiry: 86400
  end_session_enabled: true
  verbose_logging: false  # Disable verbose logging to suppress health check logs
  valid_scopes:
    - "openid"
    - "profile"
    - "email"
    - "offline_access"
    - "User.Read"

# EntraID/AzureAD compatibility settings
entraid:
  tenant_id: "12345678-1234-1234-1234-123456789abc"
  version: "v2" # v1 or v2

# CORS for React development - using defaults
cors:
  enabled: true
  # Leave origins, methods, and headers empty to use OpenID Connect optimized defaults

# Development users with Azure AD compatible claims
users:
  admin:
    display_name: "IT Administrator"
    extra_valid_scopes:
      - "Directory.Read.All"
    extra_claims:
      email: "admin@mycompany.com"
      preferred_username: "admin@mycompany.com"
      name: "IT Administrator"
      given_name: "IT"
      family_name: "Administrator"
      oid: "11111111-1111-1111-1111-111111111111"
      tid: "12345678-1234-1234-1234-123456789abc"
      roles: ["GlobalAdmin", "UserAdmin"]
      groups: ["IT-Admins", "All-Users"]
      upn: "admin@mycompany.com"
  
  john.doe:
    display_name: "John Doe"
    extra_claims:
      email: "john.doe@mycompany.com"
      preferred_username: "john.doe@mycompany.com"
      name: "John Doe"
      given_name: "John"
      family_name: "Doe"
      oid: "22222222-2222-2222-2222-222222222222"
      tid: "12345678-1234-1234-1234-123456789abc"
      roles: ["User"]
      groups: ["Engineering", "All-Users"]
      department: "Engineering"
      job_title: "Software Engineer"
      upn: "john.doe@mycompany.com"
  
  jane.smith:
    display_name: "Jane Smith"
    extra_claims:
      email: "jane.smith@mycompany.com"
      preferred_username: "jane.smith@mycompany.com"
      name: "Jane Smith"
      given_name: "Jane"
      family_name: "Smith"
      oid: "33333333-3333-3333-3333-333333333333"
      tid: "12345678-1234-1234-1234-123456789abc"
      roles: ["User"]
      groups: ["Marketing", "All-Users"]
      department: "Marketing"
      job_title: "Marketing Manager"
      upn: "jane.smith@mycompany.com"
