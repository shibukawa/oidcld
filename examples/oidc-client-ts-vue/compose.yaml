services:
  # OpenID Connect Identity Provider for Local Development
  oidcld:
    image: ghcr.io/shibukawa/oidcld:latest
    container_name: oidcld-demo
    ports:
      - "8080:80"
    volumes:
      - ./oidcld-config.yaml:/app/oidcld.yaml:ro
    environment:
      - OIDCLD_CONFIG=/app/oidcld.yaml
    command: ["serve", "--config", "/app/oidcld.yaml"]

  # Vue.js Sample Application (Production)
  vue-app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: vue-oidc-demo-prod
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    depends_on:
      oidcld:
        condition: service_healthy
    profiles:
      - production

volumes:
  vue_node_modules:
