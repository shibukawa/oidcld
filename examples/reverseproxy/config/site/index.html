<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OIDCLD Edge Gateway Sample</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <p class="eyebrow">OIDCLD Edge/Web Gateway</p>
      <h1>Static SPA + OpenAPI Mock + API Gateway</h1>
      <p class="hero-copy">
        This page is served directly from <code>reverse_proxy.hosts[].routes[].static_dir</code>.
        The API buttons call an OpenAPI-backed mock behind route-level Bearer token checks.
      </p>
      <div class="hero-actions">
        <button id="login-button" class="primary">Sign In</button>
        <button id="logout-button" class="ghost" disabled>Sign Out</button>
        <button id="reload-button" class="ghost">Reload Route</button>
      </div>
    </header>

    <nav class="tabs">
      <a href="/" data-route="/">Home</a>
      <a href="/dashboard" data-route="/dashboard">Dashboard</a>
    </nav>

    <main id="app"></main>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
