# OIDCLD Configuration for Docker with managed self-signed TLS
# This configuration enables Azure MSAL compatibility with persistent local certificates

# OpenID Connect IdP settings (Azure AD v2 compatible)
oidc:
  iss: "https://oidc.localhost:8443" # Use actual server URL for CORS testing
  pkce_required: true
  nonce_required: true
  expired_in: 3600
  aud_claim_format: string # Keep single-audience aud aligned with EntraID-style output
  login_ui:
    env_title: "Compose Sample"
    accent_color: "#2563EB"
    info_markdown_file: "./login-info.md"
  refresh_token_enabled: true
  refresh_token_expiry: 86400
  end_session_enabled: true
  verbose_logging: false # Disable verbose logging to suppress health check logs
  cors: true
  valid_scopes:
    - "openid"
    - "profile"
    - "email"
    - "offline_access"
    - "User.Read"

# EntraID/AzureAD compatibility settings
entraid:
  tenant_id: "12345678-1234-1234-1234-123456789abc"
  version: "v2" # v1 or v2

# Developer Console and metadata companion
console:
  port: "18889"
  bind_address: "0.0.0.0"

# Managed development CA persisted in the Docker volume mounted at /app/tls
certificate_authority:
  ca_dir: "/app/tls"
  domains:
    - "localhost"
    - "*.localhost"
  ca_cert_ttl: "87600h"
  leaf_cert_ttl: "720h"

reverse_proxy:
  log_retention: 200
  hosts:
    - host: https://app.localhost
      cors: true
      routes:
        - path: "/api"
          label: "backend-api"
          target_url: "http://demo-api:3000"
          rewrite_path_prefix: "/"
          gateway:
            required:
              scope: "User.Read"
              aud: "test-client-id"
            forward_claims_as_headers:
              sub: "X-OIDC-Sub"
              scope: "X-OIDC-Scope"
        - path: "/"
          label: "frontend"
          target_url: "http://app-frontend:80"
    - host: https://app2.localhost
      cors: true
      routes:
        - path: "/apimock"
          label: "api-mock"
          openapi_file: "./openapi/mock.yaml"
          rewrite_path_prefix: "/"
          gateway:
            required:
              scope: "User.Read"
              aud: "app2-client-id"
            forward_claims_as_headers:
              sub: "X-OIDC-Sub"
              scope: "X-OIDC-Scope"
          mock:
            prefer_examples: true
            default_status: "200"
            fallback_content_type: "application/json"
        - path: "/"
          label: "frontend-static"
          static_dir: "/app/app2-dist"
          spa_fallback: true

# Development users with Azure AD compatible claims
users:
  admin:
    display_name: "IT Administrator"
    extra_valid_scopes:
      - "User.Read"
      - "Directory.Read.All"
    extra_claims:
      email: "admin@mycompany.com"
      preferred_username: "admin@mycompany.com"
      name: "IT Administrator"
      given_name: "IT"
      family_name: "Administrator"
      oid: "11111111-1111-1111-1111-111111111111"
      tid: "12345678-1234-1234-1234-123456789abc"
      roles: ["GlobalAdmin", "UserAdmin"]
      groups: ["IT-Admins", "All-Users"]
      upn: "admin@mycompany.com"

