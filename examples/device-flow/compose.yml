version: '3.8'

services:
  oidc-server:
    build:
      context: ../../
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./config:/app/config
    command: ["./oidcld", "--config", "/app/config/oidcld.yaml"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  device-client:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      oidc-server:
        condition: service_healthy
    environment:
      - OIDC_ISSUER=http://oidc-server:80
      - OIDC_CLIENT_ID=device-flow-cli
      - OIDC_SCOPE=openid profile email
    stdin_open: true
    tty: true

networks:
  default:
    name: oidc-device-flow
