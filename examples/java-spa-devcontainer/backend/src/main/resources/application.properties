quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Use oidcld's HTTP metadata companion inside the shared Compose network to avoid
# trusting the managed local CA inside the dev container.
quarkus.oidc.auth-server-url=http://oidcld:8888
quarkus.oidc.application-type=service
quarkus.oidc.token.audience=quarkus-vue-client
